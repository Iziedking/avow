# CI/CD for the agent backend: build the image, push it to GHCR, and roll it out on the VPS.
# The frontend deploys separately on Vercel (its own git integration), so this only fires on
# backend-relevant changes.
#
# Repo secrets required: VPS_HOST, VPS_USER, VPS_SSH_KEY (a private key the VPS authorizes).
name: deploy-agent

on:
  push:
    branches: [main]
    paths:
      - "packages/agent/**"
      - "packages/sdk/**"
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - ".github/workflows/deploy-agent.yml"
  workflow_dispatch:

concurrency:
  group: deploy-agent
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Surface the VPS host so the rollout step can skip cleanly until the VPS secrets are set.
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository names must be lowercase; the owner login can contain capitals.
      - name: Compute the lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/avow-agent" >> "$GITHUB_OUTPUT"

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ship the current compose file to the VPS so a change in the repo deploys itself. Only the
      # compose file is avow-owned and safe to overwrite; the Caddyfile is a shared file on this
      # VPS (the existing Caddy serves other sites too), so the avow site block is added once by hand.
      - name: Ship the compose file to the VPS
        if: env.VPS_HOST != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: ~/avow-deploy/
          strip_components: 1 # drop the deploy/ prefix so it lands as ~/avow-deploy/docker-compose.yml

      # Skips until the VPS secrets exist, so the image still builds and pushes in the meantime.
      - name: Roll out on the VPS
        if: env.VPS_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/avow-deploy
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
