# CI/CD for the agent backend: build the image, push it to GHCR, and roll it out on the VPS.
# The frontend deploys separately on Vercel (its own git integration), so this only fires on
# backend-relevant changes.
#
# Repo secrets required: VPS_HOST, VPS_USER, VPS_SSH_KEY (a private key the VPS authorizes).
name: deploy-agent

on:
  push:
    branches: [main]
    paths:
      - "packages/agent/**"
      - "packages/sdk/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-agent.yml"
  workflow_dispatch:

concurrency:
  group: deploy-agent
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/avow-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Roll out on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/avow-deploy
            docker compose pull
            docker compose up -d
            docker image prune -f
