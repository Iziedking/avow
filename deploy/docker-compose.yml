# Avow backend on a VPS: the agent server behind Caddy, which terminates TLS for api.avow.site.
# Put this file, Caddyfile, and a filled-in .env (see .env.example) in the same folder on the VPS,
# log in to the image registry once, then run: docker compose up -d
services:
  agent:
    image: ghcr.io/iziedking/avow-agent:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - agent-data:/data # claimed-agent state survives restarts
    expose:
      - "8787" # internal only; Caddy proxies to it

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - agent

volumes:
  agent-data:
  caddy-data:
  caddy-config:
